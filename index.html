<!DOCTYPE html>
<html lang="en">
	<head>
		<meta
			http-equiv="Content-Type"
			content="text/html; charset=UTF-8"
		/>
		<meta
			name="viewport"
			content="width=device-width, initial-scale = 1.0, maximum-scale = 1.0, user-scalable=no"
		/>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.2.4/jquery.min.js"></script>
		<script src="./PDF.js Library/pdf.js"></script>
		<script src="./PDF.js Library/pdf.worker.js"></script>
		<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/1.9.426/pdf_viewer.js"></script> -->
		<link
			rel="stylesheet"
			href="./index.css"
		/>
		<title>PDF Reader</title>
	</head>

	<body>
		<section id="landing-page">
			<div id="landing-card">
				<h1>PDF Reader</h1>
				<p>Drop in a PDF and hit play. Clean reading with text-to-speech.</p>
				<p id="privacy-note">
					Read privately: your PDF remains on your device.
				</p>
				<button id="upload-button">Select PDF</button>
			</div>
		</section>
		<input
			type="file"
			id="file-to-upload"
			accept="application/pdf"
		/>

		<div id="pdf-main-container">
			<div id="pdf-loader">Loading document ...</div>
			<div id="pdf-contents">
				<div
					id="pdf-meta"
					class="navBar"
				>
					<div id="pdf-buttons">
						<button
							id="toc-toggle"
							class="icon-button"
							type="button"
							title="Contents"
							aria-label="Contents"
							aria-expanded="false"
						>
							<svg viewBox="0 0 24 24" aria-hidden="true">
								<line x1="4" y1="6" x2="20" y2="6"></line>
								<line x1="4" y1="12" x2="20" y2="12"></line>
								<line x1="4" y1="18" x2="20" y2="18"></line>
							</svg>
						</button>
						<button
							class="icon-button"
							type="button"
							onclick="startTextToSpeech()"
							title="Read Aloud"
							aria-label="Read Aloud"
						>
							<svg viewBox="0 0 24 24" aria-hidden="true">
								<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
								<path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
								<path d="M18.5 6a9 9 0 0 1 0 12"></path>
							</svg>
						</button>
						<button
							id="scroll"
							class="icon-button icon-label-button"
							type="button"
							onclick="scrollToCurrentPage()"
							title="Go to Reading Page"
							aria-label="Go to Reading Page"
						>
							<svg viewBox="0 0 24 24" aria-hidden="true">
								<circle cx="12" cy="12" r="7.5"></circle>
								<circle class="center-dot" cx="12" cy="12" r="3.6"></circle>
								<path d="M12 1.5v3.5"></path>
								<path d="M12 19v3.5"></path>
								<path d="M1.5 12h3.5"></path>
								<path d="M19 12h3.5"></path>
							</svg>
							<span>Reading</span>
						</button>
						<button
							id="resume-button"
							class="icon-button"
							type="button"
							onclick="resume()"
							title="Resume"
							aria-label="Resume"
						>
							<svg viewBox="0 0 24 24" aria-hidden="true">
								<polygon points="8 5 19 12 8 19 8 5"></polygon>
							</svg>
						</button>
						<button
							id="pause-button"
							class="icon-button"
							type="button"
							onclick="pause()"
							title="Pause"
							aria-label="Pause"
						>
							<svg viewBox="0 0 24 24" aria-hidden="true">
								<rect x="6" y="5" width="4" height="14"></rect>
								<rect x="14" y="5" width="4" height="14"></rect>
							</svg>
						</button>
						<select id="voiceSelect"></select>
						<select
							id="speech-rate"
							aria-label="Reading speed"
							title="Reading speed"
						>
							<option value="0.75">0.75x</option>
							<option value="1" selected>1x</option>
							<option value="1.25">1.25x</option>
							<option value="1.5">1.5x</option>
							<option value="1.75">1.75x</option>
							<option value="2">2x</option>
						</select>
					</div>

					<div id="page-count-container">
						Page
						<input
							type="number"
							id="pdf-current-page"
							min="1"
							value="1"
							aria-label="Current page"
						/>
						of
						<div id="pdf-total-pages"></div>
					</div>
				</div>
				<div id="pdf-body">
					<div id="pdfContainer"></div>
				</div>
				<div id="page-loader">Loading page ...</div>
			</div>
		</div>
		<dialog id="pdf-toc-dialog">
			<div id="pdf-toc-header">
				<div id="pdf-toc-title">Table of Contents</div>
			</div>
			<div id="pdf-toc-items">No outline available</div>
		</dialog>
		<script src="./index.js"></script>
	</body>
</html>
